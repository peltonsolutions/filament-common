name: Zizmor

# Static security audit of the GitHub Actions workflows themselves (zizmor):
# enforces SHA-pinned actions and flags other CI risks — template injection via
# ${{ }}, over-broad permissions, dangerous triggers (pull_request_target), etc.
# Output renders to the run's job summary (no code-scanning / GHAS needed, so it
# works on private repos too). Enforcing: any finding (an unpinned action,
# injection, dangerous trigger, etc.) fails the check.

on:
  pull_request:
    paths: ['.github/workflows/**', '.github/actions/**']
  push:
    branches: [main]
    paths: ['.github/workflows/**', '.github/actions/**']
  schedule:
    - cron: '0 6 * * 1'  # weekly catch-all

permissions:
  contents: read

jobs:
  zizmor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install zizmor
        run: python -m pip install --quiet zizmor

      # GITHUB_TOKEN enables zizmor's online audits. No "|| true" — pipefail makes
      # a non-zero zizmor exit (any finding) fail the check. The summary still
      # renders below via if: always().
      - name: Run zizmor
        run: |
          set -o pipefail
          zizmor . | tee zizmor.txt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Render findings to job summary
        if: always()
        run: |
          {
            echo "## 🔎 zizmor — workflow security audit"
            echo ""
            echo '```'
            cat zizmor.txt 2>/dev/null || echo "(no output)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
